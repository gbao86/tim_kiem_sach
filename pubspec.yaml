name: tim_kiem_sach
description: "A Flutter book search application"
publish_to: 'none'

version: 2.0.4+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  firebase_core: ^2.15.1
  firebase_auth: ^4.7.3
  google_sign_in: ^6.1.4
  cloud_firestore: ^4.8.5
  cached_network_image: ^3.2.3
  flutter_svg: ^2.0.7
  intl: ^0.18.1
  uuid: ^3.0.7
  fl_chart: ^0.63.0
  cloud_functions: ^4.3.5
  firebase_messaging: ^14.6.6
  share_plus: ^7.1.0
  url_launcher: ^6.1.12
  cupertino_icons: ^1.0.5
  webview_flutter: ^4.2.2
  html: ^0.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Roboto
      fonts:
        - asset: fonts/Roboto-Regular.ttf
        - asset: fonts/Roboto-Bold.ttf
          weight: 700
        - asset: fonts/Roboto-Light.ttf
          weight: 300
